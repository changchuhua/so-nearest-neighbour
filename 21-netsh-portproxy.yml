title: Stealthy Netsh Portproxy Creation via Redirection
id: 8d3e4f5g-a1b2-4c3d-9e8f-0123456789ab
status: experimental
description: Detects the creation of a network port proxy using netsh interface portproxy, where output is redirected to a temporary log file with error suppression. This is a common technique for lateral movement and pivoting.
logsource:
    category: process_creation
    product: windows
detection:
    selection_process:
        - Image|endswith: 
            - '\cmd.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
        - OriginalFileName: 
            - 'Cmd.Exe'
            - 'PowerShell.EXE'
            - 'pwsh.dll'
    selection_netsh:
        CommandLine|contains|all:
            - 'netsh'
            - 'portproxy'
            - 'add'
    selection_redirection:
        CommandLine|contains:
            - '2>&1'
            - '*>&1'
    selection_temp_path:
        CommandLine|contains:
            - 'C:\Windows\Temp\'
    condition: all of selection_*
falsepositives:
    - Highly specific administrative scripts for legacy network redirection.
level: critical