title: GooseEgg Malware Hardcoded Registry Persistence
id: 6a1b2c3d-4e5f-6a7b-8c9d-0e1f2a3b4c5d
status: experimental
description: |
  Detects the creation of a 'rogue' protocol handler registry CLSID subkey as observed in GooseEgg exploit components.
references:
  - Internal Code Analysis (Waygoose/GooseEgg)
date: 2026/02/22
logsource:
  category: registry_set
  product: windows
detection:
    selection:
        TargetObject|contains: 'Classes\PROTOCOLS\Handler\rogue'
        TargetObject|endswith: '\CLSID'
        registry.data.strings|contains: '026CC6D7-34B2-33D5-B551-CA31EB6CE345'
    condition: selection
falsepositives:
  - Unknown
level: critical
tags:
  - attack.persistence
  - attack.privilege_escalation
  - attack.t1547.001
