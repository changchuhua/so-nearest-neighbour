title: Stealthy Firewall Rule Addition with Temp Log Masquerading
id: 7c2b1a9d-3e4f-4b90-a123-ef56789abcde
status: experimental
description: Detects the addition of a Windows Firewall rule where output is redirected to a log file in a system temp directory using error suppression (2>&1).
date: 2026/02/22
tags:
    - attack.defense_evasion
    - attack.t1562.004
logsource:
    category: process_creation
    product: windows
detection:
    selection_process:
        - Image|endswith: 
            - '\cmd.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
        - OriginalFileName: 
            - 'Cmd.Exe'
            - 'PowerShell.EXE'
            - 'pwsh.dll'
    selection_firewall:
        CommandLine|contains|all:
            - 'netsh'
            - 'add'
    either_firewall:
        CommandLine|contains:
            - 'firewall'
            - 'advfirewall'
    selection_redirection:
        CommandLine|contains:
            - '2>&1'
            - '*>&1'
    selection_temp_path:
        CommandLine|contains:
            - 'C:\Windows\Temp\'
    condition: all of selection_* and either_firewall
falsepositives:
    - Legacy custom installers that wrap netsh commands in a shell and log to system temp.
level: critical